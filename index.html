<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Alert Masa Aktif Kartu</title>
<style>
:root{--bg:#f4f7fb;--card:#fff;--text:#182230;--muted:#667085;--primary:#175cd3;--danger:#d92d20;--warning:#dc6803;--success:#039855;--border:#d0d5dd}
*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--text)}
.container{max-width:1250px;margin:auto;padding:24px}h1{margin:0 0 5px}.subtitle{color:var(--muted);margin:0 0 22px}
.panel,.stat{background:var(--card);border:1px solid #e4e7ec;border-radius:14px;box-shadow:0 4px 16px rgba(16,24,40,.05)}
.panel{padding:18px;margin-bottom:18px}.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.stat{padding:15px}.stat strong{font-size:26px;display:block;margin-top:4px}.stat small{color:var(--muted)}
.grid{display:grid;grid-template-columns:repeat(5,minmax(150px,1fr));gap:12px}
label{display:block;font-size:12px;font-weight:bold;margin-bottom:6px;color:#344054}
input,select,button{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px}
button{cursor:pointer;font-weight:bold}.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-light{background:#fff;color:#344054}.btn-danger{background:#fff1f0;color:var(--danger);border-color:#fecdca}
.actions,.toolbar,.toolbar-left,.toolbar-right,.row-actions{display:flex;gap:8px;flex-wrap:wrap}.actions{margin-top:14px}.actions button,.row-actions button,.toolbar button{width:auto}
.toolbar{justify-content:space-between;align-items:center}.toolbar input{width:260px}
.notice{border-left:5px solid var(--warning);background:#fffaeb;padding:12px 14px;border-radius:8px;margin-bottom:15px;display:none}
.table-wrap{overflow:auto}table{width:100%;border-collapse:collapse;min-width:1100px}
th,td{text-align:left;padding:11px;border-bottom:1px solid #eaecf0;font-size:13px;white-space:nowrap}
th{background:#f9fafb;color:#475467}tr.expired{background:#fff1f0}tr.alert{background:#fff8e7}tr.ok{background:#f0fff7}
.badge{display:inline-block;padding:5px 9px;border-radius:999px;font-weight:bold;font-size:12px}
.badge.expired{background:#fee4e2;color:#b42318}.badge.alert{background:#fef0c7;color:#b54708}.badge.ok{background:#dcfae6;color:#067647}
.empty{text-align:center;color:var(--muted);padding:35px}.sync{font-size:12px;color:var(--muted);margin-left:auto}.sync.online{color:var(--success)}.sync.error{color:var(--danger)}
dialog{border:0;border-radius:14px;max-width:600px;width:calc(100% - 30px);padding:0;box-shadow:0 18px 50px rgba(0,0,0,.25)}
dialog::backdrop{background:rgba(16,24,40,.55)}.modal-head{padding:17px 20px;background:#fff4ed}.modal-body{padding:18px 20px;max-height:60vh;overflow:auto}.modal-foot{padding:14px 20px;text-align:right}.modal-foot button{width:auto}
@media(max-width:900px){.grid{grid-template-columns:1fr 1fr}.summary{grid-template-columns:1fr 1fr}}
@media(max-width:560px){.container{padding:12px}.grid{grid-template-columns:1fr}.toolbar input{width:100%}.toolbar-left,.toolbar-right{width:100%}}
</style>
</head>
<body>
<div class="container">
<h1>Alert Masa Aktif Kartu</h1>
<p class="subtitle">Database online bersama <span id="syncStatus" class="sync">Menghubungkan...</span></p>
<div id="notice" class="notice"></div>
<div class="summary">
<div class="stat"><small>Total kartu</small><strong id="totalCount">0</strong></div>
<div class="stat"><small>Mau expired</small><strong id="alertCount">0</strong></div>
<div class="stat"><small>Sudah expired</small><strong id="expiredCount">0</strong></div>
<div class="stat"><small>Status aman</small><strong id="okCount">0</strong></div>
</div>

<div class="panel">
<form id="cardForm">
<input type="hidden" id="editId">
<div class="grid">
<div><label>Nomor Kartu / Nomor HP</label><input id="cardNumber" required placeholder="082287394582"></div>
<div><label>Bank</label><input id="bank" required placeholder="BCA"></div>
<div><label>Nama</label><input id="name" required placeholder="ARIF KURNIA"></div>
<div><label>Masa Aktif</label><input id="expiryDate" type="date" required></div>
<div><label>Alert berapa hari sebelumnya?</label><input id="alertDays" type="number" min="0" value="10" required></div>
</div>
<div class="actions">
<button class="btn-primary" id="saveBtn" type="submit">Simpan Data</button>
<button class="btn-light" id="cancelBtn" type="button" style="display:none">Batal Edit</button>
</div>
</form>
</div>

<div class="panel">
<div class="toolbar">
<div class="toolbar-left">
<input id="search" placeholder="Cari nomor, bank, atau nama...">
<select id="statusFilter" style="width:auto">
<option value="ALL">Semua Status</option><option value="ALERT">Mau Expired</option>
<option value="EXPIRED">Expired</option><option value="OK">OK</option>
</select>
</div>
<div class="toolbar-right">
<button class="btn-light" id="refreshBtn" type="button">Refresh Data</button>
<button class="btn-light" id="notifyBtn" type="button">Aktifkan Notifikasi</button>
</div>
</div>
</div>

<div class="panel table-wrap">
<table><thead><tr>
<th>NOMOR KARTU</th><th>MASA AKTIF</th><th>BANK</th><th>NAMA</th><th>DUEDATE</th>
<th>TODAY</th><th>SISA HARI</th><th>STATUS</th><th>AKSI</th>
</tr></thead><tbody id="tableBody"></tbody></table>
<div id="emptyState" class="empty">Belum ada data.</div>
</div>
</div>

<dialog id="alertDialog">
<div class="modal-head"><strong>⚠️ Peringatan Masa Aktif Kartu</strong></div>
<div class="modal-body" id="alertList"></div>
<div class="modal-foot"><button class="btn-primary" onclick="alertDialog.close()">Saya Mengerti</button></div>
</dialog>

<script>
let cards=[];
const $=id=>document.getElementById(id);
const todayStart=()=>{const d=new Date();return new Date(d.getFullYear(),d.getMonth(),d.getDate())};
const parseDate=v=>{const [y,m,d]=v.split("-").map(Number);return new Date(y,m-1,d)};
const fmt=d=>new Intl.DateTimeFormat("id-ID",{day:"2-digit",month:"short",year:"numeric"}).format(d).replace(/\./g,"");
const days=(a,b)=>Math.ceil((a-b)/86400000);
const esc=t=>String(t).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));

function computed(card){
 const expiry=parseDate(card.expiry_date), due=new Date(expiry), today=todayStart();
 due.setDate(due.getDate()-Number(card.alert_days||0));
 const remaining=days(expiry,today);
 let status="OK"; if(today>expiry)status="EXPIRED"; else if(today>=due)status="ALERT";
 return {card,expiry,due,today,remaining,status};
}
function setSync(text,type=""){const s=$("syncStatus");s.textContent=text;s.className="sync "+type}
async function api(url="",options={}){
 const res=await fetch("/api/cards"+url,{headers:{"Content-Type":"application/json"},...options});
 const data=await res.json().catch(()=>({}));
 if(!res.ok)throw new Error(data.error||"Terjadi kesalahan server");
 return data;
}
async function loadCards(showAlert=false){
 try{
  setSync("Sinkronisasi...");
  const response = await api();

cards = Array.isArray(response)
  ? response
  : Array.isArray(response.results)
    ? response.results
    : [];
  
  setSync("● Tersinkron","online");
  render();
  if(showAlert)checkAlerts();
 }catch(e){setSync("Gagal sinkron","error");alert(e.message)}
}
function render(){
 const q=$("search").value.trim().toLowerCase(), filter=$("statusFilter").value;
 const all=cards.map(computed);
 $("totalCount").textContent=all.length;
 $("alertCount").textContent=all.filter(x=>x.status==="ALERT").length;
 $("expiredCount").textContent=all.filter(x=>x.status==="EXPIRED").length;
 $("okCount").textContent=all.filter(x=>x.status==="OK").length;
 const rows=all.filter(x=>filter==="ALL"||x.status===filter)
 .filter(x=>[x.card.card_number,x.card.bank,x.card.name].join(" ").toLowerCase().includes(q))
 .sort((a,b)=>a.expiry-b.expiry);
 $("tableBody").innerHTML=rows.map(x=>`<tr class="${x.status.toLowerCase()}">
 <td><strong>${esc(x.card.card_number)}</strong></td><td>${fmt(x.expiry)}</td>
 <td>${esc(x.card.bank)}</td><td>${esc(x.card.name)}</td><td>${fmt(x.due)}</td>
 <td>${fmt(x.today)}</td><td>${x.remaining<0?Math.abs(x.remaining)+" hari lewat":x.remaining+" hari"}</td>
 <td><span class="badge ${x.status.toLowerCase()}">${x.status==="ALERT"?"MAU EXPIRED":x.status}</span></td>
 <td class="row-actions"><button class="btn-light" onclick="editCard(${x.card.id})">Edit</button>
 <button class="btn-danger" onclick="deleteCard(${x.card.id})">Hapus</button></td></tr>`).join("");
 $("emptyState").style.display=rows.length?"none":"block";
 const p=all.filter(x=>x.status!=="OK"), n=$("notice");
 if(p.length){n.style.display="block";n.innerHTML=`Ada <strong>${p.filter(x=>x.status==="ALERT").length}</strong> kartu mau expired dan <strong>${p.filter(x=>x.status==="EXPIRED").length}</strong> kartu sudah expired.`}
 else n.style.display="none";
}
$("cardForm").onsubmit=async e=>{
 e.preventDefault();
 const id=$("editId").value;
 const body={card_number:$("cardNumber").value.trim(),bank:$("bank").value.trim().toUpperCase(),
 name:$("name").value.trim().toUpperCase(),expiry_date:$("expiryDate").value,alert_days:Number($("alertDays").value)};
 try{
  $("saveBtn").disabled=true;
  await api(id?`?id=${id}`:"",{method:id?"PUT":"POST",body:JSON.stringify(body)});
  resetForm(); await loadCards(true);
 }catch(e){alert(e.message)}finally{$("saveBtn").disabled=false}
};
window.editCard=id=>{
 const c=cards.find(x=>x.id===id); if(!c)return;
 $("editId").value=c.id;$("cardNumber").value=c.card_number;$("bank").value=c.bank;
 $("name").value=c.name;$("expiryDate").value=c.expiry_date;$("alertDays").value=c.alert_days;
 $("saveBtn").textContent="Update Data";$("cancelBtn").style.display="inline-block";scrollTo({top:0,behavior:"smooth"});
};
window.deleteCard=async id=>{
 if(!confirm("Hapus data kartu ini untuk semua pengguna?"))return;
 try{await api(`?id=${id}`,{method:"DELETE"});await loadCards()}catch(e){alert(e.message)}
};
function resetForm(){$("cardForm").reset();$("editId").value="";$("alertDays").value=10;$("saveBtn").textContent="Simpan Data";$("cancelBtn").style.display="none"}
$("cancelBtn").onclick=resetForm;$("search").oninput=render;$("statusFilter").onchange=render;$("refreshBtn").onclick=()=>loadCards();
$("notifyBtn").onclick=async()=>{if(!("Notification"in window))return alert("Browser tidak mendukung notifikasi.");const p=await Notification.requestPermission();alert(p==="granted"?"Notifikasi aktif.":"Izin notifikasi belum diberikan.")};
function checkAlerts(){
 const items=cards.map(computed).filter(x=>x.status!=="OK");if(!items.length)return;
 $("alertList").innerHTML=items.map(x=>`<div style="padding:10px 0;border-bottom:1px solid #eee">
 <strong>${esc(x.card.card_number)}</strong> — ${esc(x.card.bank)} — ${esc(x.card.name)}<br>
 ${x.status==="EXPIRED"?`<span style="color:#b42318">Sudah expired ${Math.abs(x.remaining)} hari</span>`:`<span style="color:#b54708">Akan expired dalam ${x.remaining} hari</span>`}
 (${fmt(x.expiry)})</div>`).join("");
 $("alertDialog").showModal();
 if("Notification"in window&&Notification.permission==="granted")
 new Notification("Alert Masa Aktif Kartu",{body:`${items.length} kartu perlu diperiksa.`});
}
loadCards(true);
setInterval(()=>loadCards(false),30000);
</script>
</body>
</html>
